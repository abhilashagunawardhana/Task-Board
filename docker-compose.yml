version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000

  frontend:
    build:
      context: ./frontend
      args:
        # Resolves to the VM's public IP during remote build, fallback to localhost for local testing
        - REACT_APP_API_URL=http://${VM_PUBLIC_IP:-localhost}:5000/api/tasks
    ports:
      - "80:80"
    depends_on:
      - backend
